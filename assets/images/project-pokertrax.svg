<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#121c2a"/>
      <stop offset="100%" style="stop-color:#16202e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b4c5ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#dcb8ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b4c5ff;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#dcb8ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#091421;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="250" rx="300" ry="200" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid lines (subtle) -->
  <line x1="100" y1="150" x2="700" y2="150" stroke="#434655" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="100" y1="220" x2="700" y2="220" stroke="#434655" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="100" y1="290" x2="700" y2="290" stroke="#434655" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="100" y1="360" x2="700" y2="360" stroke="#434655" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Chart line -->
  <polyline 
    points="100,340 200,280 280,310 360,220 440,260 540,170 650,190 700,160" 
    fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chart fill area -->
  <polygon 
    points="100,340 200,280 280,310 360,220 440,260 540,170 650,190 700,160 700,400 100,400" 
    fill="#dcb8ff" fill-opacity="0.05"/>

  <!-- Data points -->
  <circle cx="360" cy="220" r="5" fill="#dcb8ff"/>
  <circle cx="540" cy="170" r="5" fill="#dcb8ff"/>
  <circle cx="700" cy="160" r="6" fill="#b4c5ff"/>
  <circle cx="700" cy="160" r="12" fill="#b4c5ff" fill-opacity="0.2"/>

  <!-- App label -->
  <rect x="100" y="60" width="140" height="36" rx="18" fill="#5c3187" fill-opacity="0.8"/>
  <text x="170" y="83" font-family="sans-serif" font-size="13" fill="#d0a1ff" text-anchor="middle" font-weight="600">Poker Trax</text>

  <!-- Stats -->
  <rect x="100" y="420" width="150" height="50" rx="8" fill="#212b39"/>
  <text x="175" y="440" font-family="sans-serif" font-size="10" fill="#c3c6d7" text-anchor="middle">Total Profit</text>
  <text x="175" y="460" font-family="sans-serif" font-size="16" fill="#b4c5ff" text-anchor="middle" font-weight="700">+$4,820</text>

  <rect x="270" y="420" width="150" height="50" rx="8" fill="#212b39"/>
  <text x="345" y="440" font-family="sans-serif" font-size="10" fill="#c3c6d7" text-anchor="middle">Sessions</text>
  <text x="345" y="460" font-family="sans-serif" font-size="16" fill="#dcb8ff" text-anchor="middle" font-weight="700">48</text>

  <rect x="440" y="420" width="150" height="50" rx="8" fill="#212b39"/>
  <text x="515" y="440" font-family="sans-serif" font-size="10" fill="#c3c6d7" text-anchor="middle">Win Rate</text>
  <text x="515" y="460" font-family="sans-serif" font-size="16" fill="#b9c3ff" text-anchor="middle" font-weight="700">64%</text>
</svg>
