<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#212b39"/>
      <stop offset="100%" style="stop-color:#091421"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#b4c5ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#091421;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b4c5ff"/>
      <stop offset="100%" style="stop-color:#dcb8ff"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <clipPath id="circle"><circle cx="200" cy="200" r="200"/></clipPath>
  </defs>

  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  <ellipse cx="200" cy="160" rx="180" ry="140" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Stylized avatar body -->
  <circle cx="200" cy="155" r="72" fill="#16202e" stroke="url(#avatarGrad)" stroke-width="2.5"/>
  <text x="200" y="175" font-family="Georgia, serif" font-size="62" fill="url(#avatarGrad)" text-anchor="middle" font-weight="700">JR</text>

  <!-- Shoulders -->
  <ellipse cx="200" cy="340" rx="110" ry="70" fill="#16202e" stroke="url(#avatarGrad)" stroke-width="2" clip-path="url(#circle)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="url(#avatarGrad)" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="8 6"/>
</svg>
